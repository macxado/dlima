backend:
  name: github
  repo: macxado/dlima
  branch: main

media_folder: "img"
public_folder: "img"

locale: "es"

collections:
  - name: "site"
    label: "Sitio web"
    files:

      - name: "data"
        label: "🪒 Dlima Barbershop"
        file: "data.json"
        format: json
        editor:
          preview: true
        fields:

          # ── PERFIL ─────────────────────────────────────────────
          - label: "Perfil"
            name: "perfil"
            widget: "object"
            collapsed: false
            summary: "Tagline, bio y contacto"
            fields:
              - label: "✏️ Tagline"
                name: tagline
                widget: string
                hint: "Frase corta bajo el logo"

              - label: "📝 Bio"
                name: bio
                widget: string
                hint: "Descripción breve de la barbería"

              - label: "📞 Teléfono"
                name: phone
                widget: string
                hint: "Con prefijo: +34986182505"

              - label: "💬 WhatsApp"
                name: whatsapp
                widget: string
                required: false
                hint: "Con prefijo. Deja vacío para no mostrar"

              - label: "✉️ Email"
                name: email
                widget: string

              - label: "📍 Dirección"
                name: address
                widget: string

          # ── APARIENCIA ─────────────────────────────────────────
          - label: "🎨 Apariencia"
            name: appearance
            widget: object
            collapsed: true
            fields:
              - label: "Logo principal"
                name: logo
                widget: image
                hint: "PNG transparente recomendado"

              - label: "Color de acento"
                name: accent_color
                widget: color
                default: "#c1974f"
                hint: "Color dorado de los bordes y detalles"

              - label: "Estilo de botones"
                name: button_style
                widget: select
                default: "glass"
                options:
                  - { label: "Cristal (actual)", value: "glass" }
                  - { label: "Sólido", value: "solid" }
                  - { label: "Outline", value: "outline" }

          # ── CAROUSEL ───────────────────────────────────────────
          - label: "🖼️ Fotos de fondo (carrusel)"
            name: carousel
            widget: object
            collapsed: true
            hint: "Las 4 fotos que rotan como fondo de pantalla"
            fields:
              - label: "Foto 1"
                name: img1
                widget: image
              - label: "Foto 2"
                name: img2
                widget: image
              - label: "Foto 3"
                name: img3
                widget: image
              - label: "Foto 4"
                name: img4
                widget: image

          # ── SEO ────────────────────────────────────────────────
          - label: "🔍 SEO y compartir"
            name: seo
            widget: object
            collapsed: true
            fields:
              - label: "Título de la pestaña"
                name: title
                widget: string
              - label: "Descripción (Google / WhatsApp preview)"
                name: description
                widget: text
                hint: "Aparece cuando alguien comparte el enlace. Máx. 160 caracteres"
              - label: "Imagen para compartir (og:image)"
                name: og_image
                widget: image
                required: false
                hint: "Se muestra al compartir en WhatsApp, Twitter, etc."

          # ── REDES ──────────────────────────────────────────────
          - label: "🔗 Iconos de redes (fila superior)"
            name: socials
            widget: list
            collapsed: true
            summary: "{{fields.title}} — {{fields.href}}"
            fields:
              - { label: "Nombre / tooltip", name: title, widget: string }
              - { label: "Enlace", name: href, widget: string, hint: "tel:+34... · mailto:... · https://..." }
              - label: "Icono"
                name: type
                widget: select
                options:
                  - { label: "📞 Teléfono", value: "phone" }
                  - { label: "📸 Instagram", value: "instagram" }
                  - { label: "🎵 TikTok", value: "tiktok" }
                  - { label: "✉️ Email", value: "email" }
                  - { label: "💬 WhatsApp", value: "whatsapp" }
                  - { label: "▶️ YouTube", value: "youtube" }
                  - { label: "👍 Facebook", value: "facebook" }
                  - { label: "⭐ Google", value: "google" }

          # ── LINKS ──────────────────────────────────────────────
          - label: "🔘 Botones / Links"
            name: links
            widget: list
            summary: "{{fields.name}} — {{fields.sub}}"
            fields:
              - label: "Activo"
                name: enabled
                widget: boolean
                default: true
                hint: "Desactiva para ocultar sin borrar"

              - label: "⭐ Destacado"
                name: featured
                widget: boolean
                default: false
                hint: "Resalta este botón con borde dorado más intenso"

              - { label: "Subtítulo (pequeño, gris)", name: sub, widget: string }
              - { label: "Texto principal del botón", name: name, widget: string }
              - { label: "Enlace (URL)", name: href, widget: string }

              - label: "Tipo de icono"
                name: icon
                widget: select
                default: "preset"
                options:
                  - { label: "🖼️ Logo oficial (elegir abajo)", value: "preset" }
                  - { label: "📁 Imagen personalizada (subir abajo)", value: "custom" }
                  - { label: "Sin icono", value: "none" }

              - label: "Logo oficial"
                name: preset_icon
                widget: select
                required: false
                hint: "Solo si elegiste 'Logo oficial' arriba"
                options:
                  - { label: "Booksy", value: "booksy" }
                  - { label: "Instagram", value: "instagram" }
                  - { label: "TikTok", value: "tiktok" }
                  - { label: "WhatsApp", value: "whatsapp" }
                  - { label: "YouTube", value: "youtube" }
                  - { label: "Facebook", value: "facebook" }
                  - { label: "Google Reviews", value: "google" }
                  - { label: "Teléfono", value: "phone" }
                  - { label: "Email", value: "email" }

              - label: "Imagen personalizada"
                name: custom_icon_url
                widget: image
                required: false
                hint: "Solo si elegiste 'Imagen personalizada' arriba. Sube un PNG o SVG cuadrado"

          # ── MAPA ───────────────────────────────────────────────
          - label: "🗺️ Mapa"
            name: maps_section
            widget: object
            collapsed: true
            fields:
              - label: "URL embed del mapa"
                name: maps_embed
                widget: string
                hint: "Google Maps → Compartir → Insertar un mapa → copia la URL del src del iframe"
              - label: "Texto de dirección"
                name: address
                widget: string

          # ── HORARIO ────────────────────────────────────────────
          - label: "🕐 Horario"
            name: schedule
            widget: object
            collapsed: true
            fields:
              - { label: "Lunes a Viernes", name: mon_fri, widget: string, hint: "Ej: 9:00–13:00 · 16:00–20:00" }
              - { label: "Sábado", name: saturday, widget: string, hint: "Ej: 9:00–14:00" }
              - { label: "Domingo cerrado", name: sunday_closed, widget: boolean, default: true }

          # ── PIE ────────────────────────────────────────────────
          - label: "📄 Pie de página"
            name: footer
            widget: string
