<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin · Dlima Barbershop</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Login screen override ── */
    body { background: #080808 !important; }

    /* Inject branding over Decap's login frame */
    #nc-root .css-1baulvz,
    #nc-root [class*="AuthenticationPage"] {
      background: #080808 !important;
    }

    /* Custom login wrapper shown before CMS loads */
    #dlima-splash {
      position: fixed; inset: 0;
      background: #080808;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
      z-index: 9999;
      font-family: 'Jost', sans-serif;
      transition: opacity 0.6s;
    }
    #dlima-splash.hide { opacity: 0; pointer-events: none; }

    #dlima-splash .brand {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      letter-spacing: 4px;
      color: #c1974f;
      text-transform: uppercase;
    }
    #dlima-splash .sub {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(193,151,79,0.5);
    }
    #dlima-splash .divider {
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, #c1974f, transparent);
    }
    #dlima-splash .loading {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(242,237,228,0.3);
      margin-top: 8px;
    }
    .dot-pulse { display: inline-flex; gap: 5px; margin-left: 8px; }
    .dot-pulse span {
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(193,151,79,0.5);
      animation: pulse 1.2s infinite;
    }
    .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- Splash mientras carga Decap -->
  <div id="dlima-splash">
    <div class="brand">Dlima Barbershop</div>
    <div class="divider"></div>
    <div class="sub">Panel de administración</div>
    <div class="loading">Cargando<span class="dot-pulse"><span></span><span></span><span></span></span></div>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // Oculta el splash cuando Decap esté listo
    window.addEventListener('load', function() {
      setTimeout(function() {
        var s = document.getElementById('dlima-splash');
        if (s) s.classList.add('hide');
      }, 1200);
    });

    // Estilos inyectados dentro del iframe de Decap CMS
    CMS.registerPreviewStyle('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Jost:wght@300;400;500&display=swap');

    // Preview de la página en el panel derecho
    var PagePreview = createClass({
      render: function() {
        var entry = this.props.entry;
        var data = entry.getIn(['data']);
        return h('div', { style: {
          fontFamily: "'Jost', sans-serif",
          background: '#080808',
          color: '#f2ede4',
          padding: '32px 24px',
          minHeight: '100vh',
          maxWidth: '380px',
          margin: '0 auto'
        }},
          h('p', { style: { color: '#c1974f', fontSize: '11px', letterSpacing: '2px', textTransform: 'uppercase', marginBottom: '4px' }},
            data.get('tagline') || '—'
          ),
          h('p', { style: { color: 'rgba(242,237,228,0.5)', fontSize: '13px', marginBottom: '24px' }},
            data.get('bio') || '—'
          ),
          h('div', { style: { borderTop: '1px solid rgba(193,151,79,0.2)', paddingTop: '16px' }},
            h('p', { style: { fontSize: '11px', color: 'rgba(193,151,79,0.6)', letterSpacing: '1px' }}, 'HORARIO'),
            h('p', { style: { fontSize: '13px', marginTop: '6px' }},
              '🗓 Lun–Vie: ' + (data.getIn(['schedule','mon_fri']) || '—')
            ),
            h('p', { style: { fontSize: '13px' }},
              '🗓 Sáb: ' + (data.getIn(['schedule','saturday']) || '—')
            )
          ),
          h('div', { style: { borderTop: '1px solid rgba(193,151,79,0.2)', paddingTop: '16px', marginTop: '16px' }},
            h('p', { style: { fontSize: '11px', color: 'rgba(193,151,79,0.6)', letterSpacing: '1px' }}, 'CONTACTO'),
            h('p', { style: { fontSize: '13px', marginTop: '6px' }}, '📞 ' + (data.get('phone') || '—')),
            h('p', { style: { fontSize: '13px' }}, '✉️ ' + (data.get('email') || '—')),
            h('p', { style: { fontSize: '13px' }}, '📍 ' + (data.get('address') || '—'))
          )
        );
      }
    });

    CMS.registerPreviewTemplate('data', PagePreview);
  </script>
</body>
</html>
